[project]
# Disable anonymized telemetry inside the container.
enable_telemetry = false

# Keep all sessions in-memory; no external persistence is required.
session_timeout = 3600

# We do not expose a data persistence layer.
user_env = []

[features]
# This is a text-only Q&A assistant.
unsafe_allow_html = false
latex = false

[UI]
name = "iPhone Guide Assistant"
description = "Ask questions about the iPhone User Guide. Answers are grounded and cited."
default_collapse_content = true
# Widen the chat column + theme the dashboard scrollbars (served from /public).
custom_css = "/public/custom.css"
# Adds the header "Live dashboard" toggle + slide-in panel behaviour.
custom_js = "/public/custom.js"

# A header button (like the built-in "Readme" link). Its click is intercepted
# by custom.js to slide in the live session dashboard instead of navigating.
[[UI.header_links]]
name = "Live dashboard"
display_name = "Live dashboard"
url = "#dashboard"
target = "_self"
icon_url = "data:image/svg+xml;base64,"

# A second header button. custom.js intercepts its click to slide in the
# copy-and-paste "Test cases" panel (TestCases.jsx) instead of navigating.
[[UI.header_links]]
name = "Test cases"
display_name = "Test cases"
url = "#tests"
target = "_self"
icon_url = "data:image/svg+xml;base64,"

[meta]
generated_by = "iphone-rag-chatbot"
